<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #fff4e6
        }

        h1 {
            text-align: center;
            font-size: 60px;
            letter-spacing: 6px;
            color: #ff7a00;
            text-shadow: 3px 3px 0 #ffffff, 6px 6px 10px rgba(0, 0, 0, 0.3);
            background: #ffe159;
        }

        h2 {
            text-align: center;
            color: #00103d;
        }

        img {
            width: 100%;
            vertical-align: middle;
            border-radius: 20px;

            transition: transform 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        img:hover {
            transform: rotate(180deg) scale(1.05);
        }

        .wrap {
            width: 1200px;
            margin-left: auto;
            margin-right: auto;
            background-color: transparent;

            display: flex;
            gap: 24px;
        }

        .wrap .box {
            background-color: transparent;

            flex: 1;
        }
    </style>
</head>

<body>

    <h1>강아지 모음집</h1>

    <section>
        <div class="wrap">
            <div class="box">
                <img src="./images/m01.jpg" alt="">
            </div>

            <div class="box">
                <img src="./images/m02.jpg" alt="">
            </div>

            <div class="box">
                <img src="./images/m03.jpg" alt="">
            </div>
        </div>
    </section>

    <h2> 강아지 등장ㅋ 바로 귀여움으로 압살ㅋ</h2>

    <section>
        <div class="wrap">
            <div class="box">
                <img src="./images/m04.jpg" alt="">
            </div>

            <div class="box">
                <img src="./images/m05.jpg" alt="">
            </div>

            <div class="box">
                <img src="./images/m06.jpg" alt="">
            </div>

            <div class="box">
                <img src="./images/m07.jpg" alt="">
            </div>
        </div>
    </section>


    <h2>억울한 눈매나 촉촉한 코나 어디 하나 빠질 수 없는 매력 포인트ㅋ</h2>

    <section>
        <div class="wrap">
            <div class="box">
                <img src="./images/m08.jpg" alt="">
            </div>

            <div class="box">
                <img src="./images/m09.jpg" alt="">
            </div>

            <div class="box">
                <img src="./images/m10.jpg" alt="">
            </div>

            <div class="box">
                <img src="./images/m11.jpg" alt="">
            </div>

                <img src="./images/m12.jpg" alt="">
            </div>
        </div>
    </section>

    <h2>바로 뽀뽀해도 무죄ㅋ</h2>

</body>

</html>
